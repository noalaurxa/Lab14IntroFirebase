workflows:
  ios-project-workflow:
    name: Xcode iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Install xcodeproj gem
        script: |
          gem install xcodeproj
      - name: Fix Target Membership Automatically (no duplicates)
        script: |
          ruby -e '
            require "xcodeproj"
            proj_path = "Lab14IntroFirebase.xcodeproj"
            proj = Xcodeproj::Project.open(proj_path)
            target = proj.targets.find { |t| t.name == "Lab14IntroFirebase" }

            Dir.glob("**/*.swift").each do |path|
              next if path.include?(".build") || path.include?("Pods")
              # Busca referencia existente por ruta
              existing_ref = proj.files.find { |f| f.path == path }
              file_ref = existing_ref || proj.new_file(path)
              # Verifica si ya está en la fase de compilación
              already_in_build = target.source_build_phase.files.any? { |b| b.file_ref.path == path }
              unless already_in_build
                target.add_file_references([file_ref])
                puts "¡Éxito! Se añadió #{path} al Target de Xcode."
              end
            end
            proj.save
          '
      - name: Build App for Simulator
        script: |
          xcodebuild build -project "Lab14IntroFirebase.xcodeproj" \
            -scheme "Lab14IntroFirebase" \
            -sdk iphonesimulator \
            -configuration Debug \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app