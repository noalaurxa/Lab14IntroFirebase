workflows:
  ios-project-workflow:
    name: Xcode iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: 15.4
    scripts:
      - name: Build App for Simulator
        script: |
          xcodebuild -project "Lab14IntroFirebase.xcodeproj" -scheme "Lab14IntroFirebase" -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=16.2
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app